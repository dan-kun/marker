<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="css-vendor/katex.min.css">
  <!-- Highlight.js theme (swapped by setTheme) -->
  <link id="hljs-theme" rel="stylesheet" href="css-vendor/highlight-light.min.css">
  <!-- GitHub Markdown base style -->
  <link rel="stylesheet" href="css-vendor/github-markdown.css">
  <!-- Our custom overrides -->
  <link id="marker-theme" rel="stylesheet" href="css/preview-light.css">

  <style>
    /* Base reset */
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }
    .markdown-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    /* Mermaid diagrams */
    .mermaid {
      text-align: center;
      margin: 1em 0;
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { border-radius: 4px; }
    /* Empty state */
    #empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #888;
      font-size: 1.1em;
      font-style: italic;
    }
  </style>
</head>
<body class="light">
  <div id="empty-state">Start typing to see the preview…</div>
  <article id="content" class="markdown-body" style="display:none"></article>

  <!-- Vendor scripts (loaded after DOM) -->
  <script src="js/markdown-it.min.js"></script>
  <script src="js/markdown-it-footnote.min.js"></script>
  <script src="js/katex.min.js"></script>
  <script src="js/auto-render.min.js"></script>
  <script src="js/highlight.min.js"></script>
  <script src="js/mermaid.min.js"></script>

  <script>
    // ── Markdown-it setup ─────────────────────────────────────────────────
    const md = window.markdownit({
      html: true,
      linkify: true,
      typographer: true,
      highlight: function(str, lang) {
        if (lang && window.hljs && hljs.getLanguage(lang)) {
          try {
            return '<pre class="hljs"><code>' +
              hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
              '</code></pre>';
          } catch (_) {}
        }
        return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
      }
    });

    if (window.markdownitFootnote) {
      md.use(markdownitFootnote);
    }

    // ── Mermaid setup ──────────────────────────────────────────────────────
    if (window.mermaid) {
      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
      });
    }

    // ── State ──────────────────────────────────────────────────────────────
    let _isDark = false;
    let _mermaidCounter = 0;

    // ── Theme ──────────────────────────────────────────────────────────────
    function setTheme(isDark) {
      _isDark = isDark;
      const body = document.body;
      const hljsTheme = document.getElementById('hljs-theme');
      const markerTheme = document.getElementById('marker-theme');

      if (isDark) {
        body.classList.remove('light');
        body.classList.add('dark');
        hljsTheme.href = 'css-vendor/highlight-dark.min.css';
        markerTheme.href = 'css/preview-dark.css';
      } else {
        body.classList.remove('dark');
        body.classList.add('light');
        hljsTheme.href = 'css-vendor/highlight-light.min.css';
        markerTheme.href = 'css/preview-light.css';
      }

      // Re-initialize mermaid with correct theme
      if (window.mermaid) {
        mermaid.initialize({
          startOnLoad: false,
          theme: isDark ? 'dark' : 'default',
          securityLevel: 'loose',
        });
      }
    }

    // ── Render ─────────────────────────────────────────────────────────────
    async function render(markdownText) {
      const emptyState = document.getElementById('empty-state');
      const content = document.getElementById('content');

      if (!markdownText || markdownText.trim() === '') {
        emptyState.style.display = 'flex';
        content.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      content.style.display = 'block';

      // Convert mermaid code blocks to placeholders before MD parsing
      const mermaidBlocks = [];
      const processedText = markdownText.replace(
        /```mermaid\n([\s\S]*?)```/g,
        (match, code) => {
          const id = `mermaid-placeholder-${mermaidBlocks.length}`;
          mermaidBlocks.push({ id, code: code.trim() });
          return `<div class="mermaid-placeholder" data-id="${id}"></div>`;
        }
      );

      // Render markdown
      let html = md.render(processedText);
      content.innerHTML = html;

      // Re-render mermaid blocks
      if (window.mermaid && mermaidBlocks.length > 0) {
        for (const block of mermaidBlocks) {
          const placeholder = content.querySelector(`[data-id="${block.id}"]`);
          if (placeholder) {
            const mermaidId = `mermaid-${++_mermaidCounter}`;
            try {
              const { svg } = await mermaid.render(mermaidId, block.code);
              placeholder.outerHTML = `<div class="mermaid">${svg}</div>`;
            } catch (e) {
              placeholder.outerHTML = `<div class="mermaid-error"><pre>Mermaid error:\n${e.message}</pre></div>`;
            }
          }
        }
      }

      // Render KaTeX math
      if (window.renderMathInElement) {
        renderMathInElement(content, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true },
          ],
          throwOnError: false,
        });
      }
    }

    // ── Scroll position ────────────────────────────────────────────────────
    function getScrollPercent() {
      const el = document.documentElement;
      if (el.scrollHeight <= el.clientHeight) return 0;
      return el.scrollTop / (el.scrollHeight - el.clientHeight);
    }

    function setScrollPercent(pct) {
      const el = document.documentElement;
      el.scrollTop = pct * (el.scrollHeight - el.clientHeight);
    }
  </script>
</body>
</html>
